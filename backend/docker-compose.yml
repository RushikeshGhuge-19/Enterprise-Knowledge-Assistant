services:

  db:
    image: postgres:16

    container_name: ka_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Acme123
      POSTGRES_DB: knowledge_assistant

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: ka_api

    depends_on:
      - db

    ports:
      - "8000:8000"

    env_file:
      - .env

volumes:
  postgres_data: