version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: knowledge_assistant_db
    environment:
      POSTGRES_USER: knowledge_user
      POSTGRES_PASSWORD: knowledge_password
      POSTGRES_DB: knowledge_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: knowledge_assistant_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
